name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: drivecare
          POSTGRES_PASSWORD: drivecare
          POSTGRES_DB: drivecare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drivecare"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://drivecare:drivecare@localhost:5432/drivecare_test
      JWT_ACCESS_SECRET: ci-access-secret-at-least-sixteen
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-sixteen
      WEB_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run prisma:generate --workspace @drivecare/api
      - run: npm run lint --workspaces --if-present
      - run: npm test --workspaces --if-present
      - run: npm run build --workspaces --if-present
